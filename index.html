<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .sky-moving {
            position: absolute;
            width: 200vw; height: 200vh;
            top: -100vh; left: 0;
            animation: moveDiagonal 45s linear infinite; 
        }

        @keyframes moveDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100vw, 100vh); }
        }

        .moon {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 210, 0.9);
            z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; } 

        /* Ulduzların YENİ, kənarı sarı (qara kölgəsiz) parlaması */
        .star {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background-color: white;
            /* Ağ və sarımtıl parıltı yayırıq */
            box-shadow: 0 0 8px rgba(255, 255, 255, 1), 
                        0 0 15px rgba(255, 215, 0, 0.6);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }

        .star::before, .star::after {
            content: '';
            position: absolute;
            /* Ortası ağ, kənarları qızılı-sarı və şəffafa gedən təmiz rəng keçidi */
            background: linear-gradient(180deg, rgba(255,215,0,0) 0%, rgba(255,255,255,1) 50%, rgba(255,215,0,0) 100%);
            pointer-events: none;
        }

        .star.star-cross-small { width: 3px; height: 3px; }
        .star.star-cross-small::before, .star.star-cross-small::after {
            top: -150%; left: 50%; width: 1px; height: 400%;
        }
        .star.star-cross-small::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-small::after { transform: translateX(-50%) rotate(-45deg); }

        .star.star-cross-large {
            width: 5px; height: 5px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 1), 0 0 25px rgba(255, 215, 0, 0.8);
        }
        .star.star-cross-large::before, .star.star-cross-large::after {
            top: -200%; left: 50%; width: 2px; height: 500%;
        }
        .star.star-cross-large::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-large::after { transform: translateX(-50%) rotate(-45deg); }

        .star.star-dot {
            width: 2.5px; height: 2.5px;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.8);
            animation: none; 
        }

        @keyframes pulseStar {
            0% { opacity: 0.8; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.15); }
        }

        /* --- SABİT ARXA FON (YENİ ŞƏKİL) --- */
        .static-bg-layer {
            position: absolute;
            top: -15px; /* Yuxarıdan kəsikləri gizlədirik */
            left: 0;
            width: 100%;
            height: 250px; /* Hündürlük */
            background-image: url('arxafon.png'); /* Yeni göndərdiyin şəkil */
            background-repeat: repeat-x; /* Yan-yana uzadaraq bütün eni doldurur */
            background-size: auto 100%; /* Hündürlüyə uyğunlaşıb yan-yana gedir */
            z-index: 5; /* Yellənən şəkillərdən (10) geridə, səmadan (1) öndə */
            pointer-events: none;
        }

        /* --- ŞƏKİLLƏRİN ASILDIĞI ZONA (HƏRƏKƏTLİ) --- */
        .hanging-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10; /* Arxa fondan daha öndə */
            pointer-events: none;
        }

        .hanging-img {
            position: absolute;
            transform-origin: top center;
            animation: swing ease-in-out infinite alternate;
            height: auto;
        }

        .img-l1 { left: 2%; top: -25px; width: 22%; max-width: 150px; animation-duration: 4.5s; }
        .img-l2 { left: 16%; top: -35px; width: 15%; max-width: 100px; animation-duration: 5.1s; animation-delay: 0.5s; }
        .img-r1 { right: 2%; top: -25px; width: 22%; max-width: 150px; animation-duration: 4.8s; animation-delay: 1.2s; }
        .img-r2 { right: 16%; top: -35px; width: 15%; max-width: 100px; animation-duration: 5.4s; animation-delay: 0.8s; }

        @keyframes swing {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* --- DALĞA VƏ MƏTN HİSSƏSİ --- */
        .bottom-section {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 35%;
            background-color: #4a148c;
            z-index: 15; /* Səma və arxa fondan yuxarıda */
        }

        .wave {
            position: absolute;
            top: -49px; left: 0;
            width: 100%; height: 50px;
            line-height: 0;
        }

        .wave svg {
            display: block; width: 100%; 
            height: calc(100% + 4px); 
            transform: translateY(2px); 
        }

        .content-area {
            padding: 20px;
            text-align: center;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- MOBİL ÜÇÜN DÜZƏLİŞLƏR --- */
        @media (max-width: 768px) {
            .moon { font-size: 50px; } 
            
            /* Sabit arxa fonu mobildə balacalaşdırırıq */
            .static-bg-layer { height: 120px; top: -5px; }

            .img-l1 { left: -2%; top: -15px; width: 30%; max-width: 110px; }
            .img-l2 { left: 18%; top: -25px; width: 20%; max-width: 75px; }
            .img-r1 { right: -2%; top: -15px; width: 30%; max-width: 110px; }
            .img-r2 { right: 18%; top: -25px; width: 20%; max-width: 75px; }

            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 
            .wave svg { height: calc(100% + 4px); transform: translateY(2px); }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="hanging-zone">
        <img src="sekil1.png" alt="Fənərlər Sol 1" class="hanging-img img-l1">
        <img src="sekil2.png" alt="Fənərlər Sol 2" class="hanging-img img-l2">
        
        <img src="sekil2.png" alt="Fənərlər Sağ 1" class="hanging-img img-r1">
        <img src="sekil1.png" alt="Fənərlər Sağ 2" class="hanging-img img-r2">
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path>
            </svg>
        </div>
        
        <div class="content-area">
            <h2>Ramazan Sürprizi</h2>
            <p>Bura xüsusi sözlər gələcək.</p>
        </div>
    </div>

    <script>
        const skyMoving = document.getElementById('sky');
        const starCount = 200; 

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            
            const starType = Math.floor(Math.random() * 3);
            let typeClass = '';
            if (starType === 0) typeClass = 'star-dot';
            else if (starType === 1) typeClass = 'star-cross-small';
            else typeClass = 'star-cross-large';
            
            star.className = `star ${typeClass}`;
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (1 + Math.random() * 1) + 's';
            
            skyMoving.appendChild(star);
        }
    </script>

</body>
</html>
