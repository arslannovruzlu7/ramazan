<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayramın Mübarək...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Playfair Display', serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        .moon { 
            position: absolute; font-size: 80px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; }

        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- ARXA FON --- */
        .static-bg-layer {
            position: absolute; top: -20px; left: 0; width: 100%; height: 350px; 
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }

        /* --- AŞAĞI BƏNÖVŞƏYİ SAHƏ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 48%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: 52px; transform: translateY(2px); }

        .content-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
            perspective: 2000px;
        }

        /* Təlimat Yazısı */
        #instruction-text {
            color:#d4af37; margin-bottom:15px; font-weight:bold; letter-spacing:3px; font-size:14px;
            transition: opacity 1s ease;
        }

        /* --- ESTETİK TƏQVİM --- */
        .calendar-box {
            position: relative;
            width: 220px; height: 280px;
            margin-top: 10px;
        }

        /* Sabit Qalın Başlıq */
        .calendar-header-fixed {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 90%; height: 45px;
            background: linear-gradient(135deg, #1a237e, #0d47a1); /* Tünd Göy */
            border-radius: 8px 8px 0 0;
            z-index: 50; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        .header-dots {
            width: 80%; display: flex; justify-content: space-between;
        }
        .header-dots span {
            width: 8px; height: 8px; background: #ffffff; border-radius: 50%;
        }

        /* Təqvim Vərəqi */
        .leaf {
            position: absolute; top: 25px; left: 0;
            width: 100%; height: 100%;
            background: #1a237e; /* Ramazan tünd göy rəngi */
            border-radius: 0 0 10px 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            box-sizing: border-box;
            transform-origin: top center;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid #303f9f;
        }

        .leaf-top-bar {
            height: 40px; background: rgba(255, 255, 255, 0.1); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px;
            font-size: 14px; font-weight: bold; color: #fff;
            letter-spacing: 1px;
        }

        .leaf-body {
            flex: 1; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .leaf-message {
            font-family: 'Dancing Script', cursive;
            font-size: 22px; color: #ffffff; text-align: center;
            line-height: 1.5; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .leaf-footer {
            height: 35px; border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #ccc; font-style: italic;
        }

        /* SÜZÜLMƏ ANİMASİYASI */
        .leaf-fall {
            animation: elegantFall 2.2s cubic-bezier(0.445, 0.05, 0.55, 0.95) forwards;
            pointer-events: none;
        }

        @keyframes elegantFall {
            0% { transform: rotateX(0deg); opacity: 1; }
            15% { transform: rotateX(-30deg) rotateY(10deg); }
            30% { transform: rotateX(-20deg) rotateZ(-15deg) translateX(30px) translateY(20px); }
            60% { transform: translateY(250px) rotateZ(25deg) rotateY(45deg); opacity: 0.7; }
            100% { transform: translateY(700px) rotateZ(60deg) rotateX(120deg); opacity: 0; }
        }

        /* MOBİL */
        @media (max-width: 768px) {
            .moon { font-size: 55px; } 
            .static-bg-layer { height: 320px; }
            .bottom-section { height: 52%; } 
            .calendar-box { width: 200px; height: 260px; }
            .leaf-message { font-size: 19px; }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="content-area">
            <div id="instruction-text">TƏQVİMİ ÇEVİRMƏK ÜÇÜN TOXUN</div>
            
            <div class="calendar-box" id="calendar">
                <div class="calendar-header-fixed" id="cal-header">
                    <div class="header-dots"><span></span><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ulduzların yaradılması
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        const calendar = document.getElementById('calendar');
        const instructionText = document.getElementById('instruction-text');
        const calHeader = document.getElementById('cal-header');

        const messages = [
            "Səninlə hər iftar bir bayramdır. ❤️", "Gözlərindəki nur ulduzlardan parlaqdır. ✨", "Sən mənim ən gözəl duamsan. 🤲",
            "Bu ay qəlbinə hüzur gətirsin.", "Sənin gülüşün dünyamı işıqlandırır. 🌸", "Yaxşı ki, varsan, mənimləsən.",
            "Dualarımda həmişə adın var.", "Ramazanın bərəkəti bizimlə olsun. 🌙", "Sən ən şirin təsadüfsən. 🥰",
            "Səni ulduzlar qədər sevirəm! ⭐", "Hər sahurda səni düşünürəm.", "Sən mənim hər şeyimsən.",
            "Bu vərəq sənə bir təbəssümdür.", "Ramazanım səninlə başladı.", "Ürəyin sevgiylə döyünsün. ❤️",
            "Səninlə hər an bir möcüzədir.", "Ramazanın nuru üzünə vursun. ✨", "Qəlbimin ən dərinindəsən.",
            "Hər günün sevinc dolu keçsin.", "Səni çox sevirəm, ulduzum! 🌟", "Süfrən bərəkətli olsun. 🍯",
            "Gözəl günlər bizi gözləyir. ✨", "Sən mənim həyat işığımsan.", "Ruhun dinc, qəlbin şad olsun.",
            "Səni düşünmək mənə hüzur verir.", "Sevgi dolu Ramazan arzu edirəm.", "Sən tək və bənzərsizsən. 💎",
            "Göyüzü qədər sonsuz sevgim var.", "Hər arzun çin olsun bu ayda.", "Bayramın mübarək, əzizim! 🌙❤️"
        ];

        let totalDays = 30;
        let removedDays = 0;

        function createLeaf(index) {
            if (index >= totalDays) return null;
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            // Z-index tərsinə ki, ilk günlər ən üstdə olsun
            leaf.style.zIndex = (totalDays + 10) - index; 
            
            leaf.innerHTML = `
                <div class="leaf-top-bar">
                    <span>🌙</span>
                    <span>GÜN ${index + 1}</span>
                    <span></span>
                </div>
                <div class="leaf-body">
                    <div class="leaf-message">${messages[index]}</div>
                </div>
                <div class="leaf-footer">© 2026 Ramazan Sevgisi</div>
            `;
            return leaf;
        }

        // Bütün 30 vərəqi əvvəlcədən yaradıb yığırıq
        for (let i = 0; i < totalDays; i++) {
            calendar.appendChild(createLeaf(i));
        }

        calendar.addEventListener('click', () => {
            // İlk toxunuşda yazını yox et
            if (instructionText.style.opacity !== "0") {
                instructionText.style.opacity = "0";
            }

            const leaves = calendar.querySelectorAll('.leaf:not(.leaf-fall)');
            if (leaves.length === 0) return;

            // Ən üstdəki vərəqi seçirik (ilk gün)
            const topLeaf = leaves[0];
            topLeaf.classList.add('leaf-fall');
            removedDays++;

            // 30-cu vərəq düşəndə hər şeyi təmizlə
            if (removedDays === totalDays) {
                setTimeout(() => {
                    calendar.style.display = 'none';
                }, 2200);
            }
        });
    </script>
</body>
</html>
