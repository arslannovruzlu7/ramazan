<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Gündəliyi</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        /* AY */
        .moon { 
            position: absolute; font-size: 80px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; 
            filter: none; z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; }

        /* ULDUZLAR */
        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        .star::before, .star::after {
            content: ''; position: absolute;
            background: linear-gradient(180deg, rgba(255, 236, 179, 0) 0%, rgba(255, 255, 255, 1) 50%, rgba(255, 236, 179, 0) 100%);
            pointer-events: none;
        }
        .star.star-cross-small { width: 3px; height: 3px; }
        .star.star-cross-small::before, .star.star-cross-small::after { top: -150%; left: 50%; width: 1px; height: 400%; }
        .star.star-cross-small::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-small::after { transform: translateX(-50%) rotate(-45deg); }
        .star.star-cross-large { width: 5px; height: 5px; filter: drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 15px #ffffff); }
        .star.star-cross-large::before, .star.star-cross-large::after { top: -200%; left: 50%; width: 1.5px; height: 500%; }
        .star.star-cross-large::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-large::after { transform: translateX(-50%) rotate(-45deg); }
        .star.star-dot { width: 2.5px; height: 2.5px; filter: drop-shadow(0 0 4px #ffd700); animation: none; }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- TƏRPƏNMƏZ ARXA FON --- */
        .static-bg-layer {
            position: absolute; top: -20px; left: 0; width: 100%; 
            height: 350px; 
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }

        /* --- AŞAĞI BƏNÖVŞƏYİ HİSSƏ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 42%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: calc(100% + 4px); transform: translateY(2px); }

        .content-area {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .title-text {
            color: #ffd700; font-size: 16px; margin-bottom: 15px;
            letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-weight: bold;
        }

        /* ========================================= */
        /* MÜKƏMMƏL 3D GÜNDƏLİK DİZAYNI (PREMIUM) */
        /* ========================================= */
        
        .book-scene {
            perspective: 1500px; /* 3D Dərinlik */
            width: 100%; height: 240px;
            display: flex; justify-content: center; align-items: center;
        }

        .book {
            position: relative;
            width: 170px; height: 230px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Kitab açılanda mərkəzdə qalması üçün sağa sürüşdürürük */
        .book.is-open {
            transform: translateX(85px) rotateX(5deg);
        }

        .book-cover, .book-page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            border-radius: 3px 12px 12px 3px;
        }

        /* --- KİTABIN CİLDİ (KAPAQ) --- */
        .book-cover {
            z-index: 10;
            transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 10px 15px 30px rgba(0,0,0,0.6); /* Qapalıykən kölgə */
        }

        .book.is-open .book-cover {
            transform: rotateY(-165deg);
            box-shadow: -10px 15px 30px rgba(0,0,0,0.5); /* Açıqkən kölgə yönü dəyişir */
        }

        .book-cover .front, .book-cover .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 3px 12px 12px 3px;
        }

        /* Qapağın Ön Üzü (Tünd bənövşəyi/qızılı dəri effekti) */
        .book-cover .front {
            background: linear-gradient(135deg, #1a052e, #3a0ca3);
            border: 2px solid #d4af37;
            border-left: 10px solid #0d0217; /* Kitabın onurğası */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), inset 0 0 5px #d4af37;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .cover-ornament {
            color: #d4af37; font-size: 45px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        .cover-title {
            color: #d4af37; font-size: 18px; font-family: 'Georgia', serif; font-weight: bold;
            text-align: center; margin-top: 15px; letter-spacing: 1px;
            padding: 0 15px;
        }

        /* Qapağın İç Üzü */
        .book-cover .back {
            background: #e6dcc3;
            transform: rotateY(180deg);
            border-right: 10px solid #0d0217;
            box-shadow: inset 8px 0 25px rgba(0,0,0,0.4);
            background-image: radial-gradient(circle, transparent 20%, #d8cdb2 140%);
        }

        /* --- KİTABIN İÇ SƏHİFƏSİ (KAĞIZ) --- */
        .book-page {
            background: #fdf8e2; /* Köhnə kağız rəngi */
            z-index: 5;
            /* Səhifə yığını (qalınlıq) effekti */
            box-shadow: 2px 0 0 #fff, 3px 0 0 #d8cdb2, 4px 0 0 #fff, 5px 0 0 #d8cdb2, 
                        inset 10px 0 25px rgba(0,0,0,0.15), 15px 15px 25px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            padding: 25px; box-sizing: border-box;
            border-right: 1px solid #d8cdb2;
        }

        .page-content {
            font-family: 'Georgia', serif; font-size: 15px;
            color: #3e2723; text-align: center; font-style: italic;
            line-height: 1.6;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* Kitab tam açılanda yazı yavaşca peyda olur */
        .book.is-open .page-content {
            opacity: 1; transform: scale(1);
            transition-delay: 0.6s; /* Qapaq açılandan sonra yazını göstər */
        }

        /* --- MOBİL ÜÇÜN DÜZƏLİŞLƏR --- */
        @media (max-width: 768px) {
            .moon { font-size: 55px; } 
            .static-bg-layer { height: 320px; top: -10px; }
            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 

            .book-scene { height: 220px; }
            .book { width: 140px; height: 190px; }
            .book.is-open { transform: translateX(70px) rotateX(5deg); }
            
            .cover-ornament { font-size: 35px; }
            .cover-title { font-size: 14px; margin-top: 10px; }
            .page-content { font-size: 13px; padding: 5px; }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="content-area">
            <div class="title-text">Ramazan Günlüyü</div>

            <div class="book-scene">
                <div class="book" id="diary-book">
                    
                    <div class="book-cover">
                        <div class="front">
                            <div class="cover-ornament">🌙</div>
                            <div class="cover-title">Bizim<br>Hekayəmiz</div>
                        </div>
                        <div class="back"></div> </div>

                    <div class="book-page">
                        <div class="page-content" id="diary-text">
                            </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // Səma və Ulduzlar
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            const starType = Math.floor(Math.random() * 3);
            let typeClass = (starType === 0) ? 'star-dot' : (starType === 1 ? 'star-cross-small' : 'star-cross-large');
            star.className = `star ${typeClass}`;
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        // --- GÜNDƏLİK MƏNTİQİ ---
        const book = document.getElementById('diary-book');
        const textElement = document.getElementById('diary-text');
        let isOpen = false;
        let isAnimating = false;

        // BURA ÖZ YAZACAĞIN 30 CÜMLƏNİ (VƏ YA HEKAYƏ HİSSƏLƏRİNİ) ƏLAVƏ EDƏ BİLƏRSƏN
        const diaryEntries = [
            "Bu günün duası: Gözlərindəki işıq, qəlbindəki huzur heç vaxt əskik olmasın. ❤️",
            "Kumsal və Ege kimi, ulduzların altında, eyni səmaya baxaraq iftarımızı gözləmək diləyiylə...",
            "Valen Akademiyasının dəhlizlərindəki sirr qədər dərinsən mənim üçün. Hər gün yenidən kəşf edirəm səni.",
            "Ramazanın bərəkəti süfrəmizdən, sevgin isə qəlbimdən heç əskik olmasın.",
            "Bu gün iftara qədər sənə olan sevgimi düşündüm. İnan, vaxtın necə keçdiyini heç anlamadım.",
            "Səninlə keçən hər Ramazan, ömrümə yazılmış ən gözəl hekayədir.",
            "Bir gün Kumsalın Egeyə baxdığı kimi sənə baxa bilmək ümidiylə...",
            "Sən mənim dualarımın ən gözəl cavabısan. Qəbul olan şükrümsən.",
            "Hər sahurda səsimin sənə çatdığı, hər iftarda əllərimizin birləşdiyi o günlərin xəyalıyla...",
            "Bu günlük səhifəsi yalnız ikimizə aiddir. Tıpkı aramızdakı qopmaz bağ kimi.",
            "Səninlə hər çətinlik, hər həsrət asanlaşır. Sən mənim həyatımdakı ən gözəl möcüzəsən.",
            "Bu ay boyunca hər günüm sənə dualarla başlayır, səninlə bitir.",
            "Yazacağım heç bir hekayə, ikimizin hekayəsi qədər mükəmməl ola bilməz.",
            "Bu gün sadəcə gülümsə. Çünki sən gülümsəyəndə mənim dünyam aydınlanır.",
            "Səni düşünmək, ən ləzzətli iftar süfrəsindən belə daha şirindir."
        ];

        book.addEventListener('click', () => {
            if (isAnimating) return; // Kitab hərəkət edərkən klikləri ləğv et
            isAnimating = true;

            if (isOpen) {
                // Kitabı bağla
                book.classList.remove('is-open');
                isOpen = false;
                
                // Qapaq bağlanandan sonra animasiya kilidini aç
                setTimeout(() => { isAnimating = false; }, 1200);
            } else {
                // Rastgələ cümlə seç (Və ya ardıcıl da edə bilərsən)
                const randomEntry = diaryEntries[Math.floor(Math.random() * diaryEntries.length)];
                textElement.innerText = randomEntry;

                // Kitabı aç
                book.classList.add('is-open');
                isOpen = true;
                
                // Qapaq tam açılandan sonra kilidi aç
                setTimeout(() => { isAnimating = false; }, 1200);
            }
        });
    </script>
</body>
</html>
