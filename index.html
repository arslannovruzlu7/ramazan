<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Sürprizi</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        /* AY */
        .moon { 
            position: absolute; font-size: 80px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; 
            filter: none; z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; }

        /* ULDUZLAR */
        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        .star::before, .star::after {
            content: ''; position: absolute;
            background: linear-gradient(180deg, rgba(255, 236, 179, 0) 0%, rgba(255, 255, 255, 1) 50%, rgba(255, 236, 179, 0) 100%);
            pointer-events: none;
        }
        .star.star-cross-small { width: 3px; height: 3px; }
        .star.star-cross-small::before, .star.star-cross-small::after { top: -150%; left: 50%; width: 1px; height: 400%; }
        .star.star-cross-small::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-small::after { transform: translateX(-50%) rotate(-45deg); }
        .star.star-cross-large { width: 5px; height: 5px; filter: drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 15px #ffffff); }
        .star.star-cross-large::before, .star.star-cross-large::after { top: -200%; left: 50%; width: 1.5px; height: 500%; }
        .star.star-cross-large::before { transform: translateX(-50%) rotate(45deg); }
        .star.star-cross-large::after { transform: translateX(-50%) rotate(-45deg); }
        .star.star-dot { width: 2.5px; height: 2.5px; filter: drop-shadow(0 0 4px #ffd700); animation: none; }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- DEKORASİYALAR (ARXA FON BÖYÜDÜLDÜ) --- */
        .static-bg-layer {
            position: absolute; top: -20px; left: 0; width: 100%; 
            height: 350px; /* 250px-dən 350px-ə qaldırıldı */
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }
        .hanging-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .hanging-img { position: absolute; transform-origin: top center; animation: swing ease-in-out infinite alternate; height: auto; will-change: transform; backface-visibility: hidden; transform: translateZ(0); }
        .img-l1 { left: 2%; top: -25px; width: 28%; max-width: 200px; animation-duration: 4.5s; }
        .img-l2 { left: 16%; top: -35px; width: 20%; max-width: 140px; animation-duration: 5.1s; animation-delay: 0.5s; }
        .img-r1 { right: 2%; top: -25px; width: 28%; max-width: 200px; animation-duration: 4.8s; animation-delay: 1.2s; }
        .img-r2 { right: 16%; top: -35px; width: 20%; max-width: 140px; animation-duration: 5.4s; animation-delay: 0.8s; }
        @keyframes swing { 0% { transform: rotateZ(-8deg) translateZ(0); } 100% { transform: rotateZ(8deg) translateZ(0); } }

        /* --- AŞAĞI BƏNÖVŞƏYİ HİSSƏ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 42%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: calc(100% + 4px); transform: translateY(2px); }

        .content-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
        }

        .title-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px; margin-bottom: 20px;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* --- FAL KURABİYƏSİ DİZAYNI --- */
        .cookie-wrapper {
            position: relative; width: 180px; height: 160px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .cracking { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-3px) rotate(-2deg); }
            50% { transform: translateX(3px) rotate(2deg); }
            75% { transform: translateX(-3px) rotate(-2deg); }
            100% { transform: translateX(0) rotate(0); }
        }

        .cookie-half {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('kurabiye.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cookie-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            transform-origin: bottom left;
            z-index: 3; 
        }
        .cookie-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
            transform-origin: bottom right;
            z-index: 1; 
        }

        .fortune-paper {
            position: absolute;
            top: 50%; left: 50%;
            width: 240px; min-height: 60px;
            background-color: #fdf8e2; 
            color: #8b0000; 
            border: 1px dashed #d4af37;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.4);
            border-radius: 4px;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            font-family: 'Georgia', serif; font-size: 16px; font-weight: bold;
            transform: translate(-50%, -50%) scale(0.1);
            opacity: 0;
            z-index: 2; 
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cookie-wrapper.opened .cookie-left {
            transform: translateX(-45px) rotate(-15deg);
        }
        .cookie-wrapper.opened .cookie-right {
            transform: translateX(45px) rotate(15deg);
        }
        .cookie-wrapper.opened .fortune-paper {
            transform: translate(-50%, -100%) scale(1); 
            opacity: 1;
        }

        /* --- MOBİL ÜÇÜN (ARXA FON BÖYÜDÜLDÜ) --- */
        @media (max-width: 768px) {
            .moon { font-size: 55px; } 
            
            /* Mobildə arxa fon 160px-dən 220px-ə qaldırıldı */
            .static-bg-layer { height: 220px; top: -15px; }

            .img-l1 { left: -5%; top: -15px; width: 45%; max-width: 180px; }
            .img-l2 { left: 15%; top: -25px; width: 35%; max-width: 130px; }
            .img-r1 { right: -5%; top: -15px; width: 45%; max-width: 180px; }
            .img-r2 { right: 15%; top: -25px; width: 35%; max-width: 130px; }
            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 
            .cookie-wrapper { width: 150px; height: 130px; }
            .fortune-paper { width: 220px; font-size: 15px; padding: 12px 15px; }
            .cookie-wrapper.opened .fortune-paper { transform: translate(-50%, -110%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="hanging-zone">
        <img src="sekil1.png" alt="Sol 1" class="hanging-img img-l1">
        <img src="sekil2.png" alt="Sol 2" class="hanging-img img-l2">
        <img src="sekil2.png" alt="Sağ 1" class="hanging-img img-r1">
        <img src="sekil1.png" alt="Sağ 2" class="hanging-img img-r2">
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="content-area">
            <div class="title-text">Günün Falı 🥠</div>

            <div class="cookie-wrapper" id="cookie-btn">
                <div class="fortune-paper" id="fortune-text">
                    Bura yazılar gələcək...
                </div>
                
                <div class="cookie-half cookie-left"></div>
                <div class="cookie-half cookie-right"></div>
            </div>

        </div>
    </div>

    <script>
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            const starType = Math.floor(Math.random() * 3);
            let typeClass = (starType === 0) ? 'star-dot' : (starType === 1 ? 'star-cross-small' : 'star-cross-large');
            star.className = `star ${typeClass}`;
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        const cookieBtn = document.getElementById('cookie-btn');
        const fortuneText = document.getElementById('fortune-text');
        let isOpened = false;

        const messages = [
            "Səninlə hər iftar bir bayramdır. ❤️",
            "Gözlərindəki işıq heç vaxt sönməsin. ✨",
            "Sən mənim bu həyatda ən gözəl duamsan. 🤲",
            "Ramazanın bərəkəti sevgimizə dolsun. 🌙",
            "Hər sahurda ağlımda, hər iftarda qəlbimdəsən.",
            "Səninlə keçən hər an mənim üçün bir möcüzədir. 🌸",
            "Bu il bütün gözəl arzuların çin olsun, mələyim.",
            "Dünyanın ən şirin təsadüfüsən. 🥰",
            "Gecən xeyrə qalsın, mənim ulduzum. ⭐",
            "Sənin gülüşün mənim dünyamı işıqlandırır.",
            "Hər dua etdiyimdə adın dilimdən düşmür. 🙏",
            "Birlikdə neçə-neçə gözəl Ramazanlara... 🎉",
            "Sən mənim həyatıma göndərilmiş ən gözəl hədiyyəsən. 🎁",
            "Qəlbinin gözəlliyi üzünə vurub. 💖",
            "Səninlə hər çətinlik asanlaşır.",
            "Səsimin çatdığı yerdə sən varsan, dualarımda sən.",
            "Sevgi səninlə məna qazanır. 🌹",
            "Hər nəfəsimdə sənə olan sevgim daha da böyüyür.",
            "Səninlə olmaq, cənnətdən bir kölgədir. 🌿",
            "Səhərlərim sənin adınla açılır, gecələrim səninlə bağlanır.",
            "Allah bizi heç vaxt ayırmasın. 🤲",
            "Sənin sevgin mənim ən böyük gücümdür.",
            "Sən mənim həyatımın ən gözəl 'amin'isən.",
            "Gözlərinə baxanda bütün dünyanı unuduram.",
            "Hər zaman üzün gülsün, sən buna layiqsən. 🌟"
        ];

        cookieBtn.addEventListener('click', () => {
            if(isOpened) {
                cookieBtn.classList.remove('opened');
                isOpened = false;
            } else {
                cookieBtn.classList.add('cracking');
                
                setTimeout(() => {
                    cookieBtn.classList.remove('cracking');
                    
                    const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                    fortuneText.innerText = randomMsg;
                    
                    cookieBtn.classList.add('opened');
                    isOpened = true;
                }, 300); 
            }
        });
    </script>
</body>
</html>
