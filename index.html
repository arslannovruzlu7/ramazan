<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehrli Ramazan Təqvimi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Pacifico&display=swap');

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        .moon { 
            position: absolute; font-size: 80px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; }

        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- ARXA FON --- */
        .static-bg-layer {
            position: absolute; top: -20px; left: 0; width: 100%; height: 350px; 
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }

        /* --- AŞAĞI SAHƏ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: 52px; transform: translateY(2px); }

        .content-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
            perspective: 1000px;
        }

        /* --- 3D TEQVIM DIZAYNI --- */
        .calendar-container {
            position: relative;
            width: 180px; height: 220px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Təqvimin üst qırmızı hissəsi (Dəmirli başlıq) */
        .calendar-header {
            position: absolute; top: -15px; left: 0;
            width: 100%; height: 40px;
            background: linear-gradient(to bottom, #b71c1c, #880e4f);
            border-radius: 8px 8px 0 0;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; justify-content: space-around; align-items: center;
        }
        .calendar-header::before, .calendar-header::after {
            content: ''; width: 10px; height: 10px; background: #333; border-radius: 50%;
        }

        /* Təqvimin vərəqləri */
        .leaf {
            position: absolute; top: 25px; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            padding: 15px; box-sizing: border-box;
            transform-origin: top center;
            transition: transform 0.3s;
        }

        /* Romantik Şrift və Yazı mərkəzi */
        .leaf-content {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 20px; color: #333;
            line-height: 1.4;
        }

        .leaf-date {
            font-family: 'Pacifico', cursive;
            font-size: 14px; color: #b71c1c;
            border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px;
        }

        /* QOPMA ANIMASIYASI (SuZulme) */
        .fall-down {
            animation: leafFall 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes leafFall {
            0% { transform: rotateX(0deg) translateY(0); opacity: 1; }
            20% { transform: rotateX(-20deg) rotateZ(5deg); }
            40% { transform: rotateX(-10deg) rotateZ(-10deg) translateX(20px); }
            60% { transform: rotateX(-15deg) rotateZ(10deg) translateX(-30px) translateY(150px); opacity: 0.8; }
            100% { transform: translateY(600px) rotateZ(30deg) rotateX(90deg); opacity: 0; }
        }

        /* MOBIL */
        @media (max-width: 768px) {
            .moon { font-size: 55px; } 
            .static-bg-layer { height: 320px; top: -10px; }
            .bottom-section { height: 50%; } 
            .calendar-container { width: 160px; height: 200px; }
            .leaf-content { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="content-area">
            <div style="color:#ffd700; margin-bottom:10px; font-weight:bold; letter-spacing:2px;">RAMAZAN TƏQVİMİ</div>
            
            <div class="calendar-container" id="calendar">
                <div class="calendar-header"></div>
                </div>
        </div>
    </div>

    <script>
        // Səma və ulduzlar
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        // --- TEQVIM MENTIQI ---
        const calendar = document.getElementById('calendar');
        
        // Bura 30 dənə romantik mesajını yaza bilərsən
        const messages = [
            "Səninlə hər iftar bir bayramdır. ❤️",
            "Gözlərindəki nur ulduzlardan daha parlaqdır. ✨",
            "Sən mənim ən gözəl duamsan. 🤲",
            "Bu ay qəlbinə hüzur, ömrünə mən gətirsin.",
            "Sənin gülüşün mənim dünyamı işıqlandırır. 🌸",
            "Yaxşı ki, varsan, yaxşı ki, mənimləsən.",
            "Dualarımda həmişə adın var, əzizim.",
            "Ramazanın bərəkəti sevgimizə dolsun. 🌙",
            "Sən mənim həyatımdakı ən şirin təsadüfsən. 🥰",
            "Səni ulduzlar qədər çox sevirəm! ⭐",
            "Hər sahurda səni düşünmək ən gözəl adətimdir.",
            "Göyüzü şahid olsun ki, sən mənim hər şeyimsən.",
            "Bu vərəq sənin üçün ən səmimi gülüşümdür.",
            "Mənim Ramazanım sənin gəlişinlə başladı.",
            "Ürəyin həmişə sevgiylə döyünsün. ❤️"
            // Davamını bura əlavə edə bilərsən...
        ];

        let currentIndex = 0;

        function createLeaf(index) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.zIndex = 20 - index; // Arxa vərəqlər daha aşağıda olsun
            
            leaf.innerHTML = `
                <div class="leaf-date">Gün ${index + 1}</div>
                <div class="leaf-content">${messages[index % messages.length]}</div>
            `;
            return leaf;
        }

        // İlkin olaraq 2 vərəq yaradaq (biri üstdə, biri altdan görünsün)
        calendar.appendChild(createLeaf(currentIndex + 1));
        const topLeaf = createLeaf(currentIndex);
        calendar.appendChild(topLeaf);

        calendar.addEventListener('click', () => {
            const activeLeaf = calendar.lastElementChild;
            if (activeLeaf.classList.contains('fall-down')) return;

            // Qopma effektini başlat
            activeLeaf.classList.add('fall-down');
            
            // 2.5 saniyə sonra vərəqi sil və altdan yenisini hazırla
            setTimeout(() => {
                activeLeaf.remove();
                currentIndex++;
                
                // Həmişə altdan 1 ehtiyat vərəq yaradaq ki, boşluq görünməsin
                const newHiddenLeaf = createLeaf(currentIndex + 1);
                newHiddenLeaf.style.opacity = "0";
                calendar.prepend(newHiddenLeaf);
                setTimeout(() => newHiddenLeaf.style.opacity = "1", 100);
            }, 2500);
        });
    </script>
</body>
</html>
