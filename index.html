<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayramın Mübarək...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Playfair Display', serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        /* --- SÜRÜŞƏN VƏ TƏKRARLANAN AY --- */
        .moon-container {
            position: absolute;
            top: -100px; /* Ekranın yuxarı sağından kənarda başlayır */
            right: -100px;
            z-index: 2;
            animation: moveMoonDiagonal 35s linear infinite; /* 35 saniyəyə bir tur atır */
        }
        @keyframes moveMoonDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-120vw, 120vh); } /* Sol aşağıya doğru sürüşür */
        }

        .moon { 
            font-size: 70px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; 
            animation: floatMoon 4s ease-in-out infinite alternate;
        }
        @keyframes floatMoon {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(15px) rotate(5deg); }
        }

        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- ARXA FON --- */
        .static-bg-layer {
            position: absolute; top: -20px; left: 0; width: 100%; height: 350px; 
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }

        /* --- AŞAĞI HİSSƏ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 48%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: 52px; transform: translateY(2px); }

        .content-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
            perspective: 2000px;
        }

        #instruction-text {
            color:#d4af37; margin-bottom:15px; font-weight:bold; letter-spacing:3px; font-size:12px;
            transition: opacity 1s ease; text-transform: uppercase;
        }

        /* --- TƏQVİM QUTUSU --- */
        .calendar-box {
            position: relative;
            width: 240px; height: 320px;
            margin-top: 10px;
        }

        .leaf-wrapper {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            cursor: pointer;
            transform-origin: top center;
        }

        /* Hər vərəqin başlığı */
        .leaf-header {
            width: 85%; height: 35px;
            margin: 0 auto;
            background: linear-gradient(135deg, #0d47a1, #002171);
            border-radius: 10px 10px 0 0;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header-dots {
            width: 60%; display: flex; justify-content: space-between;
        }
        .header-dots span {
            width: 5px; height: 5px; background: #d4af37; border-radius: 50%;
            box-shadow: 0 0 5px #d4af37;
        }

        /* Yarpağın daxili dizaynı */
        .leaf-content {
            flex: 1;
            background: #070b34; 
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
            border: 1.5px solid #1a237e;
            margin-top: -3px;
            position: relative;
            overflow: hidden;
        }

        /* Arxa fondakı naxış (Pattern) */
        .leaf-content::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        /* Künc ornamentləri */
        .ornament {
            position: absolute; width: 40px; height: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }
        .orn-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .orn-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .leaf-top-bar {
            height: 45px; background: rgba(255, 255, 255, 0.03); 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-size: 12px; font-weight: bold; color: #d4af37;
            letter-spacing: 2px;
        }

        .leaf-body {
            flex: 1; padding: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .leaf-message {
            font-family: 'Dancing Script', cursive;
            font-size: 22px; color: #ffffff; text-align: center;
            line-height: 1.6; z-index: 5;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- QRAFİKA --- */
        .graphic-silhouette {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; 
            height: auto;
            opacity: 0.15; 
            pointer-events: none;
            z-index: 1; 
        }

        .graphic-silhouette img {
            width: 100%;
            height: auto;
            filter: invert(100%) sepia(80%) saturate(400%) hue-rotate(340deg) brightness(90%);
        }

        .leaf-footer {
            height: 35px; border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #666; letter-spacing: 1px;
        }

        /* DÜŞMƏ ANİMASİYASI */
        .leaf-fall {
            animation: elegantFall 2.2s cubic-bezier(0.445, 0.05, 0.55, 0.95) forwards;
            pointer-events: none;
        }

        @keyframes elegantFall {
            0% { transform: rotateX(0deg); opacity: 1; }
            20% { transform: rotateX(-45deg) rotateY(15deg) translateY(-10px); }
            100% { transform: translateY(1000px) rotateZ(80deg) rotateX(150deg); opacity: 0; }
        }

        /* --- FİNAL YAZISI VƏ ATƏŞFƏŞANLIQ CSS --- */
        #final-wish {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            text-align: center;
            text-shadow: 0 0 20px #ff0000, 0 0 30px #d4af37;
            opacity: 0;
            transition: opacity 1.5s ease;
            z-index: 100;
            pointer-events: none;
            width: 100%;
            padding: 0 20px; /* Telefonda kənarlara dəyməməsi üçün */
            box-sizing: border-box; /* Padding-in eni pozmamasını təmin edir */
            word-wrap: break-word;
        }

        .firework {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
        }

        /* YENİ ƏLAVƏ EDİLƏN HİSSƏ */
        #fireworks-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ekrandan çıxan fişəngləri gizlədir */
            pointer-events: none; /* Toxunmalara (klik) mane olmur */
            z-index: 98;
        }

        @media (max-width: 768px) {
            .moon { font-size: 50px; }
            .calendar-box { width: 210px; height: 290px; }
            .leaf-message { font-size: 19px; }
            #final-wish { 
                font-size: 32px; /* Mobil üçün yazını daha da kiçiltdim */
                line-height: 1.4;
            } 
        }
    </style>
</head>
<body>

    <div id="fireworks-container"></div>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky"></div>
        <div class="moon-container">
            <div class="moon">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="content-area">
            <div id="instruction-text">Təqvimi çevirmək üçün toxun</div>
            <div class="calendar-box" id="calendar"></div>
        </div>
    </div>

    <div id="final-wish">Ramazan Bayramın Mübarək! <br> </div>

    <script>
        // Səma ulduzları
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        const messages = [
            "Bu kiçik hədiyyə gününü gözəlləşdirmək üçündür.", "Hər kəsin qəlbinə görə verilən bu ayda sənə ən gözəl şeyləri arzulayıram. ", "Gözlərindəki nur ulduzlardan belə parlaqdır. ", "Bütün duaların ən xeyirli şəkildə qəbul olsun.",
            "Bu ay qəlbinə hüzur gətirsin.", "Sənin gülüşün dünyayı işıqlandırır.", "Hər günün sənin qədər gözəl olsun.",
            "Bəzən gözləməyin özüdə gözəldir.", "Ramazanın bərəkəti səninlə olsun. ", "Sən qarşıma çıxan ən gözəl təsadüfsən. ",
            "Bu gün sənə ancaq yaxşı xəbərlər gəlsin.", "Hər şeyin ən yaxşısına layiqsən.", 
            "Hər vərəqi təbəssüm ilə çevirməni ümid edirəm.", "Qərarlarına sonsuz hörmətim var, amma bu, sənə yaxşı gün arzulamağıma mane deyil.", "Ürəyin sevgiylə döyünsün. ",
            "Bu bayram xeyirlərə vəsilə olsun.", "Ramazanın nuru üstündə olsun. ", "Qəlbimindəki saflıq və təmizlik daim olsun.",
            "Hər günün sevinc dolu keçsin.", "İslamın nurlu günəşi ürəyinə dolsun. ", "Süfrən bərəkətli olsun.",
            "Gələcəyin gözəl və parlaq olsun. ", "Könlüm səadətlə dolsun.", "Ruhun dinc, qəlbin şad olsun.",
            "Hüzurlu və sakit ömürlər arzu edirəm.", "Hər duan qəbul olsun bu ayda.", "Sevgi dolu Ramazan arzu edirəm.", "Könlün bütün dərtlərdən uzaq olsun.",
            "Ulduzlar qədər parlaq və gözəl həyatın olsun.",  "Bəzən kiçik bir şey insanın üzünü güldürə bilər. Ümid edirəm ki, bu da onlardan biri olar. "
        ];

        const calendar = document.getElementById('calendar');
        const instructionText = document.getElementById('instruction-text');
        let removedDays = 0;

        function createLeaf(index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'leaf-wrapper';
            wrapper.style.zIndex = 100 - index;

            wrapper.innerHTML = `
                <div class="leaf-header">
                    <div class="header-dots"><span></span><span></span><span></span><span></span></div>
                </div>
                <div class="leaf-content">
                    <div class="ornament orn-tl"></div>
                    <div class="ornament orn-br"></div>
                    
                    <div class="graphic-silhouette">
                        <img src="https://raw.githubusercontent.com/arslannovruzlu7/ramazan/main/ramadan.png" alt="Ramazan Qrafikası">
                    </div>

                    <div class="leaf-top-bar">
                        <span>🌙</span>
                        <span>GÜN ${index + 1}</span>
                        <span>⭐</span>
                    </div>
                    <div class="leaf-body">
                        <div class="leaf-message">${messages[index]}</div>
                    </div>
                    <div class="leaf-footer">RAMAZAN 2026</div>
                </div>
            `;
            return wrapper;
        }

        // Təqvimi qurmaq
        for (let i = 0; i < 30; i++) {
            calendar.appendChild(createLeaf(i));
        }

        // Atəşfəşanlıq Funksiyaları
        function startFireworks() {
            const colors = ['#ff0000', '#ffd700', '#ffffff', '#ff69b4', '#00ff00', '#00ffff'];
            
            setInterval(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight * 0.6); // Ekranın yuxarı hissəsində
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                createFireworkExplosion(x, y, color);
            }, 500); // Hər yarım saniyədən bir
        }

        function createFireworkExplosion(x, y, color) {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.backgroundColor = color;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 6 + 2;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                // YENİ ƏLAVƏ EDİLƏN DƏYİŞİKLİK
                document.getElementById('fireworks-container').appendChild(particle);
                
                let op = 1;
                const move = setInterval(() => {
                    particle.style.left = (parseFloat(particle.style.left) + vx) + 'px';
                    particle.style.top = (parseFloat(particle.style.top) + vy) + 'px';
                    op -= 0.02;
                    particle.style.opacity = op;
                    
                    if (op <= 0) {
                        clearInterval(move);
                        particle.remove();
                    }
                }, 20);
            }
        }

        // Klik hadisəsi
        calendar.addEventListener('click', () => {
            if (instructionText.style.opacity !== "0") {
                instructionText.style.opacity = "0";
            }

            const leaves = calendar.querySelectorAll('.leaf-wrapper:not(.leaf-fall)');
            if (leaves.length === 0) return;

            const topLeaf = leaves[0];
            topLeaf.classList.add('leaf-fall');
            removedDays++;

            if (removedDays === 30) {
                // Yarpaq ekrandan çıxmağa başlayanda (1.2 saniyə sonra) arxa planı gizlət və atəşfəşanlığı başlat
                setTimeout(() => {
                    calendar.style.display = 'none';
                    if (instructionText) instructionText.style.display = 'none';
                    
                    // Atəşfəşanlığı başlat
                    startFireworks();
                }, 1200); 

                // Atəşfəşanlıq başladıqdan az sonra yazını göstər
                setTimeout(() => {
                    const wish = document.getElementById('final-wish');
                    wish.style.opacity = "1";
                }, 2000); 
            }
        });
    </script>
</body>
</html>
