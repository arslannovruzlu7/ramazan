<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehrli Ramazan Davulu</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sky-moving { position: absolute; width: 200vw; height: 200vh; top: -100vh; left: 0; animation: moveDiagonal 45s linear infinite; }
        @keyframes moveDiagonal { 0% { transform: translate(0, 0); } 100% { transform: translate(-100vw, 100vh); } }
        
        .moon { 
            position: absolute; font-size: 80px; color: #fff; 
            text-shadow: 0 0 20px #ffffff, 0 0 40px #fffde7; 
            filter: blur(1.5px); z-index: 2; 
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; }

        .star {
            position: absolute; border-radius: 50%; pointer-events: none;
            background-color: #ffffff; filter: drop-shadow(0 0 5px #ffd700);
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulseStar { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* --- DEKORASİYALAR --- */
        .static-bg-layer {
            position: absolute; top: -15px; left: 0; width: 100%; height: 250px; 
            background-image: url('arxafon.png'); background-repeat: repeat-x; 
            background-size: auto 100%; z-index: 5; pointer-events: none;
        }
        .hanging-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .hanging-img { position: absolute; transform-origin: top center; animation: swing ease-in-out infinite alternate; height: auto; will-change: transform; }
        .img-l1 { left: 2%; top: -25px; width: 28%; max-width: 200px; animation-duration: 4.5s; }
        .img-l2 { left: 16%; top: -35px; width: 20%; max-width: 140px; animation-duration: 5.1s; }
        .img-r1 { right: 2%; top: -25px; width: 28%; max-width: 200px; animation-duration: 4.8s; }
        .img-r2 { right: 16%; top: -35px; width: 20%; max-width: 140px; animation-duration: 5.4s; }
        @keyframes swing { 0% { transform: rotateZ(-8deg); } 100% { transform: rotateZ(8deg); } }

        /* --- DAVUL SAHƏSİ --- */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 42%;
            background-color: #4a148c; z-index: 15;
        }
        .wave { position: absolute; top: -49px; left: 0; width: 100%; height: 50px; }
        .wave svg { display: block; width: 100%; height: calc(100% + 4px); transform: translateY(2px); }

        .drum-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; position: relative;
        }

        /* Sehrli Parıltı Keçidli Yazı */
        .magic-text-box {
            position: relative; margin-bottom: 25px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; width: 90%;
        }

        #magic-text {
            color: #ffd700; font-size: 24px; font-weight: bold;
            text-align: center; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            opacity: 1; transition: opacity 0.3s;
        }

        /* Parıltı effekti (Shimmer) */
        .shimmer-line {
            position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: skewX(-20deg);
            z-index: 2;
        }

        .animate-shimmer { animation: shimmerMove 0.8s ease-out forwards; }
        @keyframes shimmerMove { 0% { left: -100%; } 100% { left: 150%; } }

        /* Davul Şəkli Dizaynı */
        .drum-wrapper {
            position: relative; width: 180px; height: 180px;
            cursor: pointer; transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .drum-wrapper:active { transform: scale(0.92); }
        
        .drum-img { width: 100%; height: 100%; object-fit: contain; }

        /* Dalğalanma (Ripple) */
        .ripple {
            position: absolute; border: 3px solid #ffd700;
            border-radius: 50%; pointer-events: none;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            animation: ripple-out 0.7s ease-out;
        }
        @keyframes ripple-out { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 350px; height: 350px; opacity: 0; } }

        @media (max-width: 768px) {
            .drum-wrapper { width: 140px; height: 140px; }
            #magic-text { font-size: 19px; }
            .bottom-section { height: 48%; }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="static-bg-layer"></div>

    <div class="hanging-zone">
        <img src="sekil1.png" class="hanging-img img-l1">
        <img src="sekil2.png" class="hanging-img img-l2">
        <img src="sekil2.png" class="hanging-img img-r1">
        <img src="sekil1.png" class="hanging-img img-r2">
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path></svg>
        </div>
        
        <div class="drum-container">
            <div class="magic-text-box">
                <div id="magic-text">Davulu döyəclə! 🥁</div>
                <div class="shimmer-line" id="shimmer"></div>
            </div>
            
            <div class="drum-wrapper" id="drum">
                <img src="davul.png" class="drum-img" alt="Ramazan Davulu">
            </div>
        </div>
    </div>

    <script>
        // Ulduzlar
        const skyMoving = document.getElementById('sky');
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            skyMoving.appendChild(star);
        }

        // Davul və Yazı Logikası
        const drum = document.getElementById('drum');
        const text = document.getElementById('magic-text');
        const shimmer = document.getElementById('shimmer');

        const messages = [
            "Gecən xeyrə qalsın, mələyim! ",
            "Bu il bütün duaların çin olsun. ",
            "Səninlə hər Ramazan bir nağıldır. ",
            "Süfrən həmişə bərəkətli olsun. ",
            "Səni dünyalar qədər sevirəm! ",
            "Qəlbinin nuru üzünə vursun. ",
            "Sən mənim ən gözəl hədiyyəmsən. ",
            "Dualarımda həmişə sən varsan.",
            "Həyatın bu ulduzlar kimi parlasın. ",
            "Ramazanın hüzuru qəlbinə dolsun.",
            "Sənin gülüşün mənim iftarımdır. ",
            "Hər sahurda səni düşünürəm. ",
            "Mehriban və xoşbəxt qal həmişə.",
            "Səninlə keçən hər an çox dəyərlidir.",
            "Bayramda görüşmək ümidi ilə! "
        ];

        let msgIdx = 0;

        drum.addEventListener('click', () => {
            // 1. Dalğalanma
            const rip = document.createElement('div');
            rip.className = 'ripple';
            drum.appendChild(rip);
            setTimeout(() => rip.remove(), 700);

            // 2. Parıltı keçidi və Yazı dəyişimi
            shimmer.classList.remove('animate-shimmer');
            void shimmer.offsetWidth; // Restart animation
            shimmer.classList.add('animate-shimmer');

            // Yazını parıltı keçən vaxtın ortasında dəyişirik
            setTimeout(() => {
                msgIdx = (msgIdx + 1) % messages.length;
                text.innerText = messages[msgIdx];
            }, 300);
        });
    </script>
</body>
</html>
