<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Sənin Üçün</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Ekranı aşan hissələri gizlədirik */
            background-color: #070720; /* Tünd mavi səma fonu */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SƏMA VƏ ULDUZLAR HİSSƏSİ --- */
        .sky-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        /* Səma sağ-yuxarıdan sol-aşağıya hərəkət edir */
        .sky-moving {
            position: absolute;
            width: 200vw; 
            height: 200vh;
            top: -100vh; /* Yuxarıdan və sağdan ehtiyat məsafə buraxırıq */
            left: 0;
            animation: moveDiagonal 25s linear infinite;
        }

        @keyframes moveDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100vw, 100vh); } /* Sol alta sürüşmə */
        }

        /* Hilal (Ay) */
        .moon {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 210, 0.9);
        }
        /* İki ay var ki, biri dalğanın arxasında itəndə, digəri yuxarıdan gəlsin */
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; } 

        /* Parıldayan Ulduzlar */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* --- FƏNƏRLƏR HİSSƏSİ --- */
        .lanterns-container {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            z-index: 10;
        }

        .lantern-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite alternate;
        }

        /* Fənərin qızılı ipi */
        .lantern-box::before {
            content: '';
            width: 2px;
            background-color: rgba(255, 215, 0, 0.5); /* Qızılı rəng ip */
            display: block;
        }

        .lantern {
            font-size: 50px;
            margin-top: -5px;
        }

        /* İplərin uzunluğu və yellənmə sürətləri */
        .lantern-box:nth-child(1) { animation-duration: 3.2s; }
        .lantern-box:nth-child(1)::before { height: 40px; }

        .lantern-box:nth-child(2) { animation-duration: 4.1s; animation-delay: 0.5s; }
        .lantern-box:nth-child(2)::before { height: 70px; }

        .lantern-box:nth-child(3) { animation-duration: 3.8s; animation-delay: 1.2s; }
        .lantern-box:nth-child(3)::before { height: 30px; }

        .lantern-box:nth-child(4) { animation-duration: 4.5s; animation-delay: 0.2s; }
        .lantern-box:nth-child(4)::before { height: 60px; }

        .lantern-box:nth-child(5) { animation-duration: 3.5s; animation-delay: 0.8s; }
        .lantern-box:nth-child(5)::before { height: 45px; }

        @keyframes swing {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* --- AŞAĞI DALĞALI BƏNÖVŞƏYİ HİSSƏ --- */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%; /* Səma ilə ayrılan yerin hündürlüyü */
            background-color: #4a148c; /* Bənövşəyi */
            z-index: 5; /* Səmadan öndə, fənərlərdən arxada */
        }

        /* Dalğa Forması (SVG) */
        .wave {
            position: absolute;
            top: -50px; /* Dalğanı yuxarı qaldırırıq */
            left: 0;
            width: 100%;
            height: 50px;
            line-height: 0;
        }

        .wave svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Sənin yazacağın mətnlərin yeri */
        .content-area {
            padding: 20px;
            text-align: center;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
            </div>
    </div>

    <div class="lanterns-container">
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path>
            </svg>
        </div>
        
        <div class="content-area">
            <h2>Xüsusi Mətnlər Bura Gələcək</h2>
            <p>Bura iftar sayğacı, onun üçün yazdığın gözəl sözlər və ya sürprizlər yerləşdirə bilərsən.</p>
        </div>
    </div>

    <script>
        // Səmaya 150 dənə parıldayan ulduz səpirik
        const skyMoving = document.getElementById('sky');
        const starCount = 150; 

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            // Ulduzların ölçüləri 1px ilə 4px arası təsadüfidir
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            // Bütün hərəkət edən qatın içinə dağıdırıq
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            
            // Bütün ulduzlar eyni anda yanıb sönməsin deyə fərqli gecikmələr veririk
            star.style.animationDelay = Math.random() * 2 + 's';
            
            skyMoving.appendChild(star);
        }
    </script>

</body>
</html>
