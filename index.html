<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SƏMA VƏ ULDUZLAR (YENİLƏNİB) --- */
        .sky-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .sky-moving {
            position: absolute;
            width: 200vw; height: 200vh;
            top: -100vh; left: 0;
            /* Sol aşağıya (diaqonal) hərəkət */
            animation: moveDiagonal 45s linear infinite; /* Hərəkət sürətini azaltdım */
        }

        @keyframes moveDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100vw, 100vh); }
        }

        .moon {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 210, 0.9);
            z-index: 2; /* Ulduzların bəziləri ayın arxasında olsun */
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; } 

        /* Ulduzların kəskin parlaması - yeni tərzi (image_5.png-dəki kimi) */
        .star {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            /* Ana ağ nöqtə */
            background-color: white;
            /* Brilyant kəsimi kimi kəskin parıltı üçün ana kölgə */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 
                        0 0 20px rgba(255, 255, 255, 0.6);
            /* Parlaqlığı yanıb-sönmədən daha kəskin etmək üçün animasiya */
            animation: pulseStar 1.5s ease-in-out infinite alternate;
        }

        /* Ulduzların kəskin X-şəkilli parıltıları */
        .star::before, .star::after {
            content: '';
            position: absolute;
            background-color: white;
            /* Brilyant kəsimi kimi dar gradient */
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
            /* Parıltıların kəskin x-şəkilli təsirini artırmaq üçün süzgəclər */
            filter: blur(1px) contrast(200%);
            pointer-events: none;
        }

        /* Daha kiçik, kəskin x-şəkilli ulduz */
        .star.star-cross-small {
            width: 3px;
            height: 3px;
        }
        .star.star-cross-small::before, .star.star-cross-small::after {
            top: -150%;
            left: 50%;
            width: 1px;
            height: 400%;
        }
        .star.star-cross-small::before {
            transform: translateX(-50%) rotate(45deg);
        }
        .star.star-cross-small::after {
            transform: translateX(-50%) rotate(-45deg);
        }

        /* Daha böyük, kəskin x-şəkilli ulduz (image_5.png-dəki kimi daha parlaq) */
        .star.star-cross-large {
            width: 6px;
            height: 6px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 1), 
                        0 0 30px rgba(255, 255, 255, 0.8);
        }
        .star.star-cross-large::before, .star.star-cross-large::after {
            top: -200%;
            left: 50%;
            width: 2px;
            height: 500%;
        }
        .star.star-cross-large::before {
            transform: translateX(-50%) rotate(45deg);
        }
        .star.star-cross-large::after {
            transform: translateX(-50%) rotate(-45deg);
        }

        /* Sadəcə sabit, parlaq nöqtə (daha az intensiv) */
        .star.star-dot {
            width: 2px;
            height: 2px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 1);
            animation: none; /* Bu növ daha sabit qalır */
        }

        /* Parlaqlığı yanıb-sönmədən kəskin pulsasiya ilə dəyişdirmək */
        @keyframes pulseStar {
            0% { 
                opacity: 0.8; 
                transform: scale(0.95); 
                filter: brightness(100%);
            }
            100% { 
                opacity: 1; 
                transform: scale(1.1); 
                filter: brightness(150%);
            }
        }

        /* --- ŞƏKİLLƏRİN ASILDIĞI ZONA --- */
        .hanging-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between; /* Şəkilləri tam olaraq iki kənara atır */
            padding: 0 5%; /* Kənarlardan çox az (5%) boşluq buraxır ki, ekrana yapışmasın */
            box-sizing: border-box; /* Padding-in ekranı böyütməsinin qarşısını alır */
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .hanging-img {
            transform-origin: top center;
            animation: swing ease-in-out infinite alternate;
            width: 25%; /* Ölçünü xeyli kiçiltdik */
            max-width: 180px; /* Maksimum böyüklük həddini azaltdıq */
            height: auto;
        }

        .img-1 { animation-duration: 4.5s; }
        .img-2 { animation-duration: 5.2s; animation-delay: 1s; }

        @keyframes swing {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* --- DALĞA VƏ MƏTN HİSSƏSİ --- */
        .bottom-section {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 35%;
            background-color: #4a148c;
            z-index: 5;
        }

        .wave {
            position: absolute;
            top: -49px; left: 0;
            width: 100%; height: 50px;
            line-height: 0;
        }

        .wave svg {
            display: block; width: 100%; 
            height: calc(100% + 4px); 
            transform: translateY(2px); 
        }

        .content-area {
            padding: 20px;
            text-align: center;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- MOBİL ÜÇÜN DÜZƏLİŞLƏR --- */
        @media (max-width: 768px) {
            .moon { font-size: 50px; } 
            
            /* Mobildə də şəkilləri balacalaşdırıb kənarlara tam sığışdırdıq */
            .hanging-img { 
                width: 32%; 
                max-width: 120px; 
            }
            
            .hanging-zone {
                padding: 0 2%; /* Mobildə kənar boşluqları bir az da azaltdıq */
            }

            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 
            .wave svg { height: calc(100% + 4px); transform: translateY(2px); }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
            </div>
    </div>

    <div class="hanging-zone">
        <img src="sekil1.png" alt="Fənərlər 1" class="hanging-img img-1">
        <img src="sekil2.png" alt="Fənərlər 2" class="hanging-img img-2">
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path>
            </svg>
        </div>
        
        <div class="content-area">
            <h2>Ramazan Sürprizi</h2>
            <p>Bura xüsusi sözlər gələcək.</p>
        </div>
    </div>

    <script>
        const skyMoving = document.getElementById('sky');
        const starCount = 200; // Ulduz sayını artırdım

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            
            // Təsadüfi ulduz növünü seç
            const starType = Math.floor(Math.random() * 3);
            let typeClass = '';
            if (starType === 0) typeClass = 'star-dot';
            else if (starType === 1) typeClass = 'star-cross-small';
            else typeClass = 'star-cross-large';
            
            star.className = `star ${typeClass}`;
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            
            // Animasiya gecikməsini təsadüfi et
            star.style.animationDelay = Math.random() * 2 + 's';
            // Pulsasiya sürətini təsadüfi et
            star.style.animationDuration = (1 + Math.random() * 1) + 's';
            
            skyMoving.appendChild(star);
        }
    </script>

</body>
</html>
