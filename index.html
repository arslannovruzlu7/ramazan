<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .sky-moving {
            position: absolute;
            width: 200vw; height: 200vh;
            top: -100vh; left: 0;
            animation: moveDiagonal 30s linear infinite;
        }

        @keyframes moveDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100vw, 100vh); }
        }

        .moon {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 210, 0.9);
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; } 

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { 
                opacity: 0.5; transform: scale(0.9); 
                box-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
            }
            100% { 
                opacity: 1; transform: scale(1.4); 
                box-shadow: 0 0 12px rgba(255, 255, 255, 1), 0 0 25px rgba(255, 215, 0, 0.5); 
            }
        }

        /* --- FƏNƏRLƏR --- */
        .lanterns-container {
            position: absolute;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-evenly;
            z-index: 10;
        }

        .lantern-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite alternate;
        }

        .lantern-box::before {
            content: '';
            width: 2px;
            background-color: rgba(255, 215, 0, 0.5);
            display: block;
        }

        .lantern { font-size: 50px; margin-top: -5px; }

        .lantern-box:nth-child(1) { animation-duration: 3.2s; }
        .lantern-box:nth-child(1)::before { height: 40px; }
        .lantern-box:nth-child(2) { animation-duration: 4.1s; animation-delay: 0.5s; }
        .lantern-box:nth-child(2)::before { height: 70px; }
        .lantern-box:nth-child(3) { animation-duration: 3.8s; animation-delay: 1.2s; }
        .lantern-box:nth-child(3)::before { height: 30px; }
        .lantern-box:nth-child(4) { animation-duration: 4.5s; animation-delay: 0.2s; }
        .lantern-box:nth-child(4)::before { height: 60px; }
        .lantern-box:nth-child(5) { animation-duration: 3.5s; animation-delay: 0.8s; }
        .lantern-box:nth-child(5)::before { height: 45px; }

        @keyframes swing {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* --- DALĞA VƏ MƏTN HİSSƏSİ --- */
        .bottom-section {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 35%;
            background-color: #4a148c;
            z-index: 5;
        }

        .wave {
            position: absolute;
            top: -49px; left: 0;
            width: 100%; height: 50px;
            line-height: 0;
        }

        /* Qırılma xəttinin ləğvi üçün hündürlüyü artırıb bir az aşağı sürüşdürdük */
        .wave svg {
            display: block; width: 100%; 
            height: calc(100% + 2px); 
            transform: translateY(1px);
        }

        .content-area {
            padding: 20px;
            text-align: center;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- MOBİL ÜÇÜN XÜSUSİ DÜZƏLİŞLƏR (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .moon { font-size: 50px; } 
            .lantern { font-size: 35px; } 
            .lantern-box::before { width: 1.5px; } 
            
            .lantern-box:nth-child(1)::before { height: 25px; }
            .lantern-box:nth-child(2)::before { height: 45px; }
            .lantern-box:nth-child(3)::before { height: 20px; }
            .lantern-box:nth-child(4)::before { height: 40px; }
            .lantern-box:nth-child(5)::before { height: 30px; }

            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 
            .wave svg { height: calc(100% + 2px); transform: translateY(1px); }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="lanterns-container">
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
        <div class="lantern-box"><div class="lantern">🏮</div></div>
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path>
            </svg>
        </div>
        
        <div class="content-area">
            <h2>Ramazan Sürprizi</h2>
            <p>Bura xüsusi sözlər gələcək.</p>
        </div>
    </div>

    <script>
        const skyMoving = document.getElementById('sky');
        const starCount = 150; 

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            
            star.style.animationDelay = Math.random() * 2 + 's';
            
            skyMoving.appendChild(star);
        }
    </script>

</body>
</html>
