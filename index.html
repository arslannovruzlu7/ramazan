<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #070720; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SƏMA VƏ ULDUZLAR --- */
        .sky-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .sky-moving {
            position: absolute;
            width: 200vw; height: 200vh;
            top: -100vh; left: 0;
            /* Sol aşağıya (diaqonal) hərəkət */
            animation: moveDiagonal 30s linear infinite;
        }

        @keyframes moveDiagonal {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100vw, 100vh); }
        }

        .moon {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 210, 0.9);
        }
        .moon-1 { top: 120vh; left: 60vw; }
        .moon-2 { top: 20vh; left: 160vw; } 

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite alternate;
        }

        /* Ulduzların kəskin (adam ağıllı) parlaması */
        @keyframes twinkle {
            0% { 
                opacity: 0.5; transform: scale(0.9); 
                box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
            }
            100% { 
                opacity: 1; transform: scale(1.4); 
                box-shadow: 0 0 8px rgba(255, 255, 255, 1), 0 0 15px rgba(255, 215, 0, 0.4); 
            }
        }

        /* --- ŞƏKİLLƏRİN ASILDIĞI ZONA --- */
        .hanging-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around; /* Şəkilləri sağa və sola aralı yayır */
            align-items: flex-start;
            z-index: 10;
            pointer-events: none; /* Şəkillər klikləməyə mane olmasın */
        }

        .hanging-img {
            transform-origin: top center;
            animation: swing ease-in-out infinite alternate;
            width: 45%; /* Ekranın genişliyinə görə avtomatik tənzimlənir */
            max-width: 400px; /* Çox böyüməsinin qarşısını alır */
            height: auto;
        }

        /* Hər iki şəklə fərqli yellənmə sürəti veririk ki, təbii görünsün */
        .img-1 { animation-duration: 4.5s; }
        .img-2 { animation-duration: 5.2s; animation-delay: 1s; }

        @keyframes swing {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* --- DALĞA VƏ MƏTN HİSSƏSİ --- */
        .bottom-section {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 35%;
            background-color: #4a148c;
            z-index: 5;
        }

        .wave {
            position: absolute;
            top: -49px; left: 0;
            width: 100%; height: 50px;
            line-height: 0;
        }

        .wave svg {
            display: block; width: 100%; 
            height: calc(100% + 4px); 
            transform: translateY(2px); 
        }

        .content-area {
            padding: 20px;
            text-align: center;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- MOBİL ÜÇÜN DÜZƏLİŞLƏR --- */
        @media (max-width: 768px) {
            .moon { font-size: 50px; } 
            
            /* Mobildə şəkillər çox böyük olmasın deyə kiçildiririk */
            .hanging-img { width: 48%; }

            .bottom-section { height: 45%; } 
            .wave { top: -29px; height: 30px; } 
            .wave svg { height: calc(100% + 4px); transform: translateY(2px); }
        }
    </style>
</head>
<body>

    <div class="sky-wrapper">
        <div class="sky-moving" id="sky">
            <div class="moon moon-1">🌙</div>
            <div class="moon moon-2">🌙</div>
        </div>
    </div>

    <div class="hanging-zone">
        <img src="sekil1.png" alt="Fənərlər 1" class="hanging-img img-1">
        <img src="sekil2.png" alt="Fənərlər 2" class="hanging-img img-2">
    </div>

    <div class="bottom-section">
        <div class="wave">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.72,187.4,99.82,233.19,83.74,277.6,71.62,321.39,56.44Z" fill="#4a148c"></path>
            </svg>
        </div>
        
        <div class="content-area">
            <h2>Ramazan Sürprizi</h2>
            <p>Bura xüsusi sözlər gələcək.</p>
        </div>
    </div>

    <script>
        const skyMoving = document.getElementById('sky');
        const starCount = 150; 

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%'; 
            
            star.style.animationDelay = Math.random() * 2 + 's';
            
            skyMoving.appendChild(star);
        }
    </script>

</body>
</html>
